services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foppa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foppa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-foppa_bank}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [foppa-network]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-foppa}:${POSTGRES_PASSWORD:-foppa_dev_password}@database:5432/${POSTGRES_DB:-foppa_bank}
      WORKERS_URL: http://workers:3001
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks: [foppa-network]

  # The worker package currently has no start script or implementation. Keep
  # it opt-in until one is added, rather than making the default stack fail.
  workers:
    profiles: [workers]
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-foppa}:${POSTGRES_PASSWORD:-foppa_dev_password}@database:5432/${POSTGRES_DB:-foppa_bank}
    expose:
      - "3001"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks: [foppa-network]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks: [foppa-network]

volumes:
  postgres-data:

networks:
  foppa-network:
    driver: bridge
